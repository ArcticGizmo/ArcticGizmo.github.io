<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Mountain logo in a hexagon">
  <defs>
    <!-- Rounded flat-top hexagon -->
    <clipPath id="hex">
      <path d="M 177,74 L 335,74 Q 361,74 374,96.5 L 453,233.5 Q 466,256 453,278.5
               L 374,415.5 Q 361,438 335,438 L 177,438 Q 151,438 138,415.5
               L 59,278.5 Q 46,256 59,233.5 L 138,96.5 Q 151,74 177,74 Z"/>
    </clipPath>
  </defs>

  <g clip-path="url(#hex)">
    <!-- Sky -->
    <rect x="0" y="0" width="512" height="512" fill="#eaeef3"/>

    <!-- Distant light-blue range -->
    <path fill="#b9c7d8"
          d="M 46,300 L 130,250 L 210,285 L 300,200 L 360,230 L 466,250 L 466,440 L 46,440 Z"/>

    <!-- Main blue massif: tall peak + second peak -->
    <path fill="#6584ad"
          d="M 55,330 L 225,112 L 270,175 L 312,150 L 360,200 L 466,320 L 466,440 L 55,440 Z"/>

    <!-- Snow cap, main peak -->
    <path fill="#ffffff"
          d="M 225,112 L 258,158 L 246,168 L 236,156 L 225,170 L 214,157 L 203,167 L 190,158 Z"/>

    <!-- Snow cap, second peak -->
    <path fill="#ffffff"
          d="M 312,150 L 328,176 L 321,170 L 314,178 L 307,169 L 300,176 Z"/>

    <!-- Foreground mid-navy range -->
    <path fill="#34507a"
          d="M 46,440 L 46,355 L 120,320 L 205,368 L 290,315 L 380,365 L 466,325 L 466,440 Z"/>

    <!-- Foreground darkest range -->
    <path fill="#22395a"
          d="M 46,440 L 46,398 L 150,335 L 270,415 L 360,368 L 466,408 L 466,440 Z"/>
  </g>
</svg>
